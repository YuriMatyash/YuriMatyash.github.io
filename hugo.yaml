  # About Section
  about:
    enable: true
    title: "About Me"
    content: |-
      I am a high-performing Computer Science student at HIT (GPA 93.7) specializing in Machine Learning and Cybersecurity. My approach to engineering is defined by a mix of academic excellence and an obsession with self-directed R&D, having dedicated over 1,000 hours to mastering Edge AI and Computer Vision beyond the standard curriculum on self directed projects.

      As the Lead Software Engineer for Israel's RoboChallenge team, I architected the C++ software stack for our robot on ESP32, securing 14th place globally. Whether I'm building hybrid CNN-RNN architectures for 3D printing anomaly detection or red-teaming LLM agents, I thrive on solving 'unanswered problems' at the intersection of software and hardware.


